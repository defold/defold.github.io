<style>
	.nav a.nav-pro-link {
		display: inline-block;
		position: relative;
		padding: 0.45rem 1rem 0.5rem;
		border-radius: 999px;
		border: 1px solid rgba(255, 225, 120, 0.78);
		background:
			linear-gradient(180deg, rgba(255, 250, 223, 0.28), rgba(255, 209, 90, 0.18) 45%, rgba(168, 109, 18, 0.2));
		color: #fff5cf;
		box-shadow:
			inset 0 1px 0 rgba(255, 251, 232, 0.42),
			0 0 12px rgba(255, 204, 77, 0.26),
			0 0 26px rgba(255, 184, 44, 0.22);
		animation: topnav-pro-pulse 2.3s ease-in-out infinite;
	}

	.nav a.nav-pro-link::before {
		content: "";
		position: absolute;
		inset: 1px;
		border-radius: inherit;
		background: linear-gradient(180deg, rgba(255, 255, 255, 0.2), transparent 34%);
		pointer-events: none;
	}

	.nav a.nav-pro-link:hover,
	.nav a.nav-pro-link.nav-pro-link-current {
		color: #fff9e2;
		border-color: rgba(255, 237, 171, 0.95);
		box-shadow:
			inset 0 1px 0 rgba(255, 253, 239, 0.56),
			0 0 18px rgba(255, 216, 110, 0.38),
			0 0 34px rgba(255, 193, 56, 0.3);
	}

	@keyframes topnav-pro-pulse {
		0%,
		100% {
			box-shadow:
				inset 0 1px 0 rgba(255, 251, 232, 0.36),
				0 0 10px rgba(255, 204, 77, 0.22),
				0 0 20px rgba(255, 184, 44, 0.16);
		}
		50% {
			box-shadow:
				inset 0 1px 0 rgba(255, 253, 239, 0.58),
				0 0 20px rgba(255, 220, 122, 0.42),
				0 0 40px rgba(255, 197, 61, 0.34);
		}
	}
</style>
