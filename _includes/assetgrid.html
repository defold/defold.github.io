{%- assign assetids = include.assetids -%}

<div class="asset-hub-results">
	<div class="asset-hub-results-header">
		<div class="asset-hub-results-copy">
			<p class="asset-hub-filter-label">Results</p>
			<h3 data-asset-results-title>{{ include.title }}</h3>
			<p class="compact asset-hub-results-summary" data-asset-results-summary>Showing {{ assetids.size }} of {{ assetids.size }} assets.</p>
		</div>
	</div>

	<div class="asset-hub-grid" data-asset-grid>
		{%- for id in assetids -%}
			{% include asset.html id=id %}
		{%- endfor -%}
	</div>
</div>
