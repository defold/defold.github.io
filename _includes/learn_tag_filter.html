<div class="learn-tag-filter asset-hub-toolbar page-surface-panel" data-learn-tag-filter data-filter-singular="{{ include.filter_singular | default: 'tag' }}" data-result-items="{{ include.result_items | default: 'resources' }}" data-filter-excluded-tags="{{ include.exclude_tags | default: '' }}">
	<div class="asset-hub-filter-shell">
		<div class="asset-hub-filter-group">
			<h3 class="asset-hub-filter-label">{{ include.label | default: "Filter by tags" }}</h3>
			<p class="compact">Choose one {{ include.filter_singular | default: "tag" }} to narrow the current list.</p>
			<div class="learn-tag-chip-row asset-hub-filter-grid" data-tag-chip-row></div>
		</div>
		<p class="compact learn-tag-results" data-tag-results>Showing all {{ include.result_items | default: "resources" }}.</p>
	</div>
</div>
