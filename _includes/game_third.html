{%- assign game=include.game -%}
<div class="game">
	<a href="{{ game.url }}" target="_blank">
		<img src="/images/games/{{ game.images.third }}" class="hoverflash" width="100%" loading="lazy"/>
	</a>
		<br/><br/>
		<div class="compact showcase-game-copy">
		<h4 class="showcase-game-title">{{ game.name }}</h4>
		<p>By {{ game.developer }}</p>
		</div>
</div>
