name: Defold
url: https://www.defold.com
description: Defold is a free, cross-platform game engine for building 2D and 3D games for desktop, web, mobile, and consoles.
markdown: kramdown
permalink: /:categories/:year/:month/:day/:title/
collections:
    assets:
        output: true
    authors:
        output: true
    tags:
        output: true
kramdown:
    auto_ids: true
    parse_block_html: true
future: true
sass:
    style: compressed
    sass_dir: _scss
exclude:
    - update.py
    - README.md
    - serve.sh
    - CNAME
    - Gemfile
    - Gemfile.lock
    - convert_to_webp.py
    - vendor/
    - .bundle/
    - node_modules/
asset_allowed_tags:
    - 3D
    - AI
    - Achievements
    - Ads
    - Analytics
    - Animation
    - Architecture
    - Art assets
    - Audio
    - Bindings
    - Blender
    - Build
    - Camera
    - Color
    - Debugging
    - Device
    - Editor
    - Filesystem
    - Fonts
    - GUI
    - Image
    - Input
    - Language
    - Live Update
    - Localization
    - Logging
    - Math
    - Mechanics
    - Mesh
    - Monetization
    - Network
    - OS
    - Particles
    - Physics
    - Platform
    - Rendering
    - Samples
    - Security
    - Serialization
    - Shaders
    - Social
    - Storage
    - Testing
    - Text
    - Tilemaps
    - Tools
    - Tutorials
    - Utilities
    - Video
defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
    values:
      opengraph_image: "https://www.defold.com/images/social/facebook-share.jpg"
      twitter_image: "https://www.defold.com/images/social/twitter-share.jpg"
